<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado</title>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            overflow:hidden;
            background:#000;
        }

        /* ===========================
           TELA PRINCIPAL (CHAMADAS)
        =========================== */

        .container{
            position:fixed;
            inset:0;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:#ffffff;
        }

        .bloco{
            text-align:center;
            margin:20px 0;
        }

        .bloco h1{
            font-size:3vw;
            color:#444;
            margin-bottom:10px;
        }

        #displaySala{
            font-size:5vw;
            font-weight:bold;
            color:#1565c0;
        }

        #displaySenha{
            font-size:8vw;
            font-weight:bold;
            color:#d32f2f;
        }

        #displayDoutor{
            font-size:4vw;
            font-weight:bold;
            color:#2e7d32;
        }

        /* Overlay para liberar áudio */
        #overlay{
            position:fixed;
            inset:0;
            background:#000;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:3vw;
            z-index:999;
            text-align:center;
            padding:20px;
        }

        audio{
            display:none;
        }
    </style>
</head>

<body>

<!-- AUDIO -->
<audio id="meuAudio">
    <source src="{{ url_for('static', filename='audio/som.mp3') }}" type="audio/mpeg">
</audio>

<!-- OVERLAY DE LIBERAÇÃO -->
<div id="overlay">
    Toque na tela para ativar áudio e chamadas
</div>

<!-- TELA DE CHAMADA -->
<div class="container">

    <div class="bloco">
        <h1>Sala</h1>
        <div id="displaySala">Nenhuma sala ainda</div>
    </div>

    <div class="bloco">
        <h1>Paciente</h1>
        <div id="displaySenha">Nenhuma senha ainda</div>
    </div>

    <div class="bloco">
        <h1>Profissional</h1>
        <div id="displayDoutor">Nenhum profissional ainda</div>
    </div>

</div>

<script>

const socket = io();

const audio = document.getElementById("meuAudio");
const overlay = document.getElementById("overlay");

let desbloqueado = false;
let tempoExibicao = null;

/* ===========================
   DESBLOQUEIO DE AUTOPLAY (TV BRO)
=========================== */

function desbloquear(){
    if (desbloqueado) return;

    audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        desbloqueado = true;
        overlay.style.display = "none";
    }).catch(() => {
        // ainda bloqueado
    });
}

overlay.addEventListener("click", desbloquear);
document.addEventListener("click", desbloquear);

/* ===========================
   CHAMADA
=========================== */

socket.on("receive_senha", (data)=>{

    document.getElementById("displaySenha").textContent =
        data.senha || "Nenhuma senha ainda";

    if (desbloqueado) {
        audio.currentTime = 0;
        audio.play().catch(console.error);
    }

    clearTimeout(tempoExibicao);

    tempoExibicao = setTimeout(()=>{
        // não limpa mais nada
        // mantém última chamada fixa na tela
    },10000);

});

/* ===========================
   SALA
=========================== */

socket.on("receive_sala",(data)=>{

    document.getElementById("displaySala").textContent =
        data.sala || "Nenhuma sala ainda";

});

/* ===========================
   DOUTOR
=========================== */

socket.on("receive_doutor",(data)=>{

    document.getElementById("displayDoutor").textContent =
        data.doutor || "Nenhum profissional ainda";

});

/* ===========================
   ANTI-SLEEP TV (KEEP ALIVE)
=========================== */

setInterval(() => {

    document.body.style.opacity = "0.99";
    setTimeout(() => {
        document.body.style.opacity = "1";
    }, 50);

}, 30000);

/* ===========================
   WAKE LOCK (SE SUPORTADO)
=========================== */

let wakeLock = null;

async function manterTelaAtiva() {
    try {
        if ("wakeLock" in navigator) {
            wakeLock = await navigator.wakeLock.request("screen");
        }
    } catch (e) {
        console.log("WakeLock não suportado");
    }
}

document.addEventListener("click", manterTelaAtiva);

</script>

</body>
</html>
