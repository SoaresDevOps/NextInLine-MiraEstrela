<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            overflow:hidden;
            background:#000;
        }

        /* ===========================
           VÍDEO
        =========================== */

        #meuVideo{
            position:fixed;
            inset:0;
            width:100vw;
            height:100vh;
            object-fit:cover;
            z-index:1;
            background:#000;
        }

        /* ===========================
           PAINEL DA SENHA
        =========================== */

        .container{
            position:fixed;
            inset:0;

            display:none;

            justify-content:center;
            align-items:center;
            flex-direction:column;

            background:#ffffff;

            z-index:100;
        }

        .bloco{
            text-align:center;
            margin:20px 0;
        }

        .bloco h1{
            font-size:3vw;
            color:#444;
            margin-bottom:10px;
        }

        #displaySala{
            font-size:5vw;
            font-weight:bold;
            color:#1565c0;
        }

        #displaySenha{
            font-size:8vw;
            font-weight:bold;
            color:#d32f2f;
        }

        #displayDoutor{
            font-size:4vw;
            font-weight:bold;
            color:#2e7d32;
        }

        audio{
            display:none;
        }
    </style>
</head>

<body>

<audio id="meuAudio">
    <source src="{{ url_for('static', filename='audio/som.mp3') }}" type="audio/mpeg">
</audio>

<video id="meuVideo" autoplay muted playsinline>
    <source src="{{ url_for('static', filename='videos/video2.mp4') }}" type="video/mp4">
</video>

<div class="container" id="painelSenha">

    <div class="bloco">
        <h1>Sala</h1>
        <div id="displaySala">Nenhuma sala ainda</div>
    </div>

    <div class="bloco">
        <h1>Paciente</h1>
        <div id="displaySenha">Nenhuma senha ainda</div>
    </div>

    <div class="bloco">
        <h1>Profissional</h1>
        <div id="displayDoutor">Nenhum profissional ainda</div>
    </div>

</div>

<script>

const socket = io();

const audio = document.getElementById("meuAudio");
const video = document.getElementById("meuVideo");
const painelSenha = document.getElementById("painelSenha");

let tempoExibicao = null;
let salaAtual = "";

/* ===========================
   LISTA DOS VÍDEOS
=========================== */

const listaVideos = [
    "{{ url_for('static', filename='videos/video2.mp4') }}",
    "{{ url_for('static', filename='videos/video4.mp4') }}"
];

let indiceVideoAtual = 0;

video.addEventListener("ended", () => {

    indiceVideoAtual++;

    if(indiceVideoAtual >= listaVideos.length){
        indiceVideoAtual = 0;
    }

    video.src = listaVideos[indiceVideoAtual];
    video.load();

    setTimeout(() => {
        video.play().catch(console.error);
    }, 200);

});
/* ===========================
   RECEBER SENHA
=========================== */

socket.on("receive_senha", (data)=>{

    document.getElementById("displaySenha").textContent =
        data.senha || "Nenhuma senha ainda";

    // NÃO PAUSA MAIS O VÍDEO
    painelSenha.style.display = "flex";

    audio.currentTime = 0;

    audio.play().catch(console.error);

    clearTimeout(tempoExibicao);

    tempoExibicao = setTimeout(()=>{

        painelSenha.style.display = "none";

    },10000);

});

/* ===========================
   RECEBER SALA
=========================== */

socket.on("receive_sala",(data)=>{

    document.getElementById("displaySala").textContent =
        data.sala || "Nenhuma sala ainda";

    salaAtual = data.sala || "";

});

/* ===========================
   RECEBER DOUTOR
=========================== */

socket.on("receive_doutor",(data)=>{

    document.getElementById("displayDoutor").textContent =
        data.doutor || "Nenhum profissional ainda";

});

</script>

</body>
</html>
